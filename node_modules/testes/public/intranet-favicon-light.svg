<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Intranet logo">
  <defs>
    <linearGradient id="redLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5a5f"/>
      <stop offset="45%" stop-color="#ff1f32"/>
      <stop offset="100%" stop-color="#d90416"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#7f0010" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Optical centering: group is shifted slightly upward -->
  <g transform="translate(0,-4)" filter="url(#softShadow)">
    <polyline
      points="76,58 126,128 76,198"
      fill="none"
      stroke="url(#redLight)"
      stroke-width="38"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <polyline
      points="140,58 190,128 140,198"
      fill="none"
      stroke="url(#redLight)"
      stroke-width="38"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
